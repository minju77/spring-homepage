<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>글 작성</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
}

.container{
width:700px;
margin:auto;
margin-top:100px;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.title{
font-size:28px;
margin-bottom:30px;
font-weight:bold;
}

label{
display:block;
margin-top:15px;
margin-bottom:5px;
font-weight:bold;
}

input[type=text]{
width:100%;
padding:10px;
font-size:16px;
border:1px solid #ccc;
border-radius:5px;
}

textarea{
width:100%;
height:200px;
padding:10px;
font-size:15px;
border:1px solid #ccc;
border-radius:5px;
resize:none;
}

button{
margin-top:20px;
padding:12px 25px;
background:#4f7cff;
border:none;
color:white;
font-size:15px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#3d63d1;
}

.back{
display:inline-block;
margin-top:20px;
text-decoration:none;
color:#4f7cff;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="title">게시글 작성</div>

<form action="/board/write" method="post">

<label>제목</label>
<input type="text" name="title" required>

<label>내용</label>
<textarea name="content" required></textarea>

<button type="submit">작성</button>

</form>

<a href="/board/list" class="back">목록으로</a>

</div>

</body>
</html>
