<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>도서 목록</title>

<style>

body{
margin:0;
font-family:Arial;
background:#e5e7eb;
}

.container{
width:1000px;
margin:auto;
margin-top:100px;
}

.title{
font-size:30px;
margin-bottom:30px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

th{
background:#4f7cff;
color:white;
padding:15px;
}

td{
padding:15px;
border-bottom:1px solid #ddd;
}

tr:hover{
background:#f5f5f5;
}

a{
text-decoration:none;
color:#333;
font-weight:bold;
}

.back{
margin-top:20px;
display:inline-block;
}

</style>
</head>


<body>

<div class="container">

<div class="title">도서 목록</div>

<table>

<thead>
<tr>
<th>ID</th>
<th>제목</th>
<th>저자</th>
<th>출판사</th>
</tr>
</thead>

<tbody>

<tr th:each="book : ${books}">

<td th:text="${book.id}"></td>

<td>
<a th:href="@{/book/{id}(id=${book.id})}"
   th:text="${book.title}">
</a>
</td>

<td th:text="${book.author}"></td>

<td th:text="${book.publisher}"></td>

</tr>

</tbody>

</table>

<br>

<a href="/" class="back">홈으로</a>

</div>

</body>
</html>
