<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>도서 상세</title>

<style>

body{
margin:0;
font-family:Arial;
background:#e5e7eb;
}

.container{
width:700px;
margin:auto;
margin-top:120px;
}

.card{
background:white;
padding:40px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
border-radius:5px;
}

.title{
font-size:30px;
margin-bottom:30px;
font-weight:bold;
}

.info{
font-size:18px;
margin-bottom:15px;
}

.label{
font-weight:bold;
color:#444;
}

.button{
margin-top:30px;
display:inline-block;
padding:10px 20px;
background:#4f7cff;
color:white;
text-decoration:none;
border-radius:4px;
}

.button:hover{
background:#3b63cc;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="title" th:text="${book.title}">책 제목</div>

<div class="info">
<span class="label">저자 :</span>
<span th:text="${book.author}">저자</span>
</div>

<div class="info">
<span class="label">출판사 :</span>
<span th:text="${book.publisher}">출판사</span>
</div>

<a href="/book/list" class="button">목록으로</a>

</div>

</div>

</body>
</html>
