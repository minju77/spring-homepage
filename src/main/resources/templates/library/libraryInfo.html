<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	<haed>
		<meta charset="UTF-8">
		<title>도서관 안내</title>
		
		<style>
			body{
				font-family:Arial;
				background:#e5e7eb;
				margin:0;
			}
			.container{
				width:800px;
				margin:auto;
				margin-top:100px;
				background:white;
				padding:40px;
				box-shadow:0 5px 15px rgba(0,0,0.1);
			}
			
			.title{
				font-size:32px;
				margin-bottom:30px;
				font-weight:bold;
			}
			
			.section{
				margin-bottom:25px;
			}
			
			.label{
				font-weight:bold;
				font-size:18px;
			}
		</style>
	</haed>
	
	<body>
		<div class="container">
			<div class="title">도서관 안내</div>
			<div class="section">
				<span class="label">도서관 소개</span>
				<p>우리 도서관은 다양한 도서와 학습 공간을 제공합니다.</p>
			</div>
			
			<div class="section">
				<span class="label">운영 시간</span>
				<p>평일: 09:00 ~ 22:00</p>
				<p>주말: 10:00 ~ 18:00</p>
			</div>
			
			<div class="section">
				<span class="label">위치</span>
				<p>천안시 동남구 청수로 12-3</p>
			</div>
			
			<div class="section">
				<span class="label">이용 방법</span>
				<p>회원 가입 후 도서를 검색하고 대출할 수 있습니다.</p>
			</div>
			
			<br>
			
			<a href="/">홈으로</a>
		</div>
	</body>
</html>
