<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>로그인</title>

<style>

body{
font-family:Arial;
background:#e5e7eb;
}

.container{
width:400px;
margin:auto;
margin-top:120px;
background:white;
padding:40px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-bottom:15px;
}

button{
width:100%;
padding:10px;
background:#4f7cff;
color:white;
border:none;
}

.signup{
margin-top:15px;
display:block;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h2>로그인</h2>

<form action="/user/login" method="post">

<input type="text" name="username" placeholder="아이디">

<input type="password" name="password" placeholder="비밀번호">

<button type="submit">로그인</button>

</form>

<a href="/user/signup" class="signup">회원가입</a>

<p th:text="${message}" style="color:green;"></p>

<p th:if="${msg}" th:text="${msg}" style="color:red;"></p>

</div>

</body>
</html>
