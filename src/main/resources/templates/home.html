<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>도서관</title>

<style>

body{
margin:0;
font-family:Arial;
background:#e5e7eb;
}

a{
text-decoration:none;
color:inherit;
display:flex;
align-items:center;
justify-content:center;
}

.container{
width:1100px;
margin:auto;
margin-top:80px;
}

.grid{
display:grid;
grid-template-columns: 300px 1fr 1fr 1fr;
grid-template-rows: 200px 200px;
gap:20px;
}

.card{
background:white;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:bold;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.search{
grid-row:1/3;
background:#4f7cff;
color:white;
font-size:30px;
}

.dark{
background:#2c3f6b;
color:white;
}

.card:hover{
	transform:translateY(-6px);
	box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<div class="container">

<div class="grid">

<a href="/book/search" class="card search">도서 검색</a>

<a href="/book/list" class="card">도서 정보</a>

<a href="/board/list" class="card">게시판</a>

<a th:if="${loginUser == null}" href="/user/login" class="card">
    로그인 / 회원가입
</a>

<a th:if="${loginUser != null}" href="/user/logout" class="card">
    로그아웃
</a>

<a href="/library" class="card dark">도서관 안내</a>


<p th:if="${loginUser != null}">
    <b th:text="${loginUser.username}"></b>님 환영합니다!
</p>

</div>

</div>

</body>
</html>
